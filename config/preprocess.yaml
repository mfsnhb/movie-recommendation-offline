retrieval:
  max_seq_len: 500
  positive_rating_min: 3.0
  negative_rating_max: 2.0
  neutral_rating: 3.0
  sequence_negative_pool_size: 500

ranking:
  max_seq_len: 300
  positive_rating_min: 4.0
  negative_rating_max: 2.0
  interest_rating_min: 4.0

multimodal:
  model_name: ViT-L-14
  pretrained: openai
  batch_size: 128
  device: auto
