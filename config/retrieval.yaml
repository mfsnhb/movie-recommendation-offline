common:
  training:
    batch_size: 768
    epochs: 10
    learning_rate: 0.0005
    weight_decay: 1.0e-5
    log_every_n_batches: 100
    early_stopping_patience: 2
    min_delta: 1.0e-4
    negative_sampling: mixed
    hard_negative_queue_size: 4096
    hard_negative_topk: 32
    two_tower_num_sampled_negatives: 64
    export_batch_size: 4096
    two_tower_temperature: 0.05
    rating_weighting_enabled: false
    rating_weight_neutral: 3.0
    rating_weight_scale: 0.25
    rating_weight_min: 0.0
    rating_weight_max: 1.0
    positive_rating_min: 4.0
    negative_rating_max: 2.0
    neutral_rating: 3.0
  evaluation:
    topk: 200
  multi_recall:
    enabled: true
    routes:
      - two_tower
      - sequence
      - item_cf
      - multimodal
      - genre
      - popular

models:
  two_tower:
    architecture:
      embedding_dim: 32
      user_hidden_dims: [256, 128]
      item_hidden_dims: [256, 128]
      dropout: 0.1

  sequence:
    architecture:
      embedding_dim: 32
      hidden_dim: 64
      num_layers: 1
      max_len: 150
      dropout: 0.1
    training:
      sequence_num_negatives: 32
      sequence_user_negative_ratio: 0.75
      sequence_loss: bce
      sequence_history_feedback: all

  item2item:
    enabled: false
    architecture:
      embedding_dim: 32
      window_size: 10
      negative_samples: 5
    training:
      epochs: 3
      learning_rate: 0.025
      batch_size: 2048
      negative_sampling: hard
      hard_negative_queue_size: 4096
      hard_negative_topk: 16
