default_model: deepfm

common:
  training:
    validation_ratio: 0.1
    early_stopping_patience: 2
    min_delta: 1.0e-4
    train_negatives: 7
    eval_negatives: 49
    rating_weighting_enabled: true
    rating_weight_neutral: 3.0
    rating_weight_scale: 0.25
    rating_weight_min: 0.5
    rating_weight_max: 1.5
  evaluation:
    final_topk: 20
    use_rerank: false
    rerank:
      genre_penalty: 0.10
      year_penalty: 0.05

models:
  deepfm:
    framework: torch
    architecture:
      embedding_dim: 32
      dnn_hidden_dims: [256, 128]
      dropout: 0.1
    training:
      batch_size: 512
      epochs: 10
      learning_rate: 0.001
      weight_decay: 1.0e-5
      log_every_n_batches: 100

  din:
    framework: torch
    architecture:
      embedding_dim: 32
      dnn_hidden_dims: [256, 128]
      attention_hidden_dims: [128, 64]
      dropout: 0.1
    training:
      batch_size: 512
      epochs: 10
      learning_rate: 0.001
      weight_decay: 1.0e-5
      log_every_n_batches: 20

  xgboost:
    framework: xgboost
    params:
      n_estimators: 300
      max_depth: 6
      learning_rate: 0.05
      subsample: 0.9
      colsample_bytree: 0.9
      reg_lambda: 1.0
      min_child_weight: 1.0

  xgboost_ranker:
    framework: xgboost
    params:
      n_estimators: 300
      max_depth: 6
      learning_rate: 0.05
      subsample: 0.9
      colsample_bytree: 0.9
      reg_lambda: 1.0
      min_child_weight: 1.0
