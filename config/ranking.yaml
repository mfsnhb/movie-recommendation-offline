default_model: din

common:
  training:
    early_stopping_patience: 2
    validation_samples_per_user: 1
    validation_max_users: 6040
    min_delta: 1.0e-4
    train_negatives: 20
    low_rating_negative_ratio: 0.6
    recall_negative_ratio: 0.3
    random_negative_ratio: 0.1
    validation_negatives: 500
    positive_rating_min: 4.0
    negative_rating_max: 2.0
    rating_weighting_enabled: true
    rating_weight_neutral: 3.0
    rating_weight_scale: 0.25
    rating_weight_min: 0.5
    rating_weight_max: 1.5
  evaluation:
    final_topk: 20
    use_rerank: false
    rerank:
      genre_penalty: 0.10
      year_penalty: 0.05

models:
  deepfm:
    framework: torch
    architecture:
      embedding_dim: 64
      dnn_hidden_dims: [256, 128]
      dropout: 0.1
    training:
      batch_size: 512
      epochs: 10
      learning_rate: 0.001
      weight_decay: 1.0e-5
      log_every_n_batches: 100

  din:
    framework: torch
    architecture:
      embedding_dim: 64
      dnn_hidden_dims: [256, 128]
      attention_hidden_dims: [128, 64]
      top_m_history: 100
      force_recent_history: 30
      dropout: 0.1
    training:
      batch_size: 512
      epochs: 10
      learning_rate: 0.001
      weight_decay: 1.0e-5
      log_every_n_batches: 100
